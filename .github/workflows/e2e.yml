name: ParaBank E2E

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: POM coverage check
        run: npm run check:coverage

      - name: Generate tests
        run: npm run generate:tests

      - name: Generate BDD specs
        run: npx bddgen

      - name: Run tests
        id: tests
        continue-on-error: true
        run: npx playwright test

      - name: Generate dashboard
        if: ${{ always() }}
        run: npm run dashboard

      - name: Upload reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: parabank-reports
          path: |
            playwright-report
            test-results
            reports
            ai-audit

      - name: Send email report
        if: ${{ always() }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run send:report

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::One or more Playwright tests failed. See uploaded artifacts and email summary."
          exit 1

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Download CI reports
        uses: actions/download-artifact@v4
        with:
          name: parabank-reports
          path: ./

      - name: Restore history cache
        uses: actions/cache@v4
        with:
          path: .pages-history
          key: pages-history-v1-${{ github.run_id }}
          restore-keys: |
            pages-history-v1-

      - name: Build site
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npx tsx utils/build-site.ts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
